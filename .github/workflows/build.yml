# Deskflow Multi-Platform Build

name: Build

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build-windows-x64:
    name: Windows x64
    runs-on: windows-latest
    
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        
      - name: Install Qt using aqtinstall
        run: |
          pip install aqtinstall
          aqt install-qt windows desktop 6.7.0 win64_msvc2019_64 --outputdir C:\Qt
          echo "QT_ROOT_DIR=C:\Qt\6.7.0\msvc2019_64" >> $env:GITHUB_ENV
          echo "Qt6_DIR=C:\Qt\6.7.0\msvc2019_64\lib\cmake\Qt6" >> $env:GITHUB_ENV
        shell: pwsh
        
      - name: Install build tools
        run: |
          # Install ninja (required by vcpkg)
          choco install ninja -y
          
          # Install WiX
          dotnet tool install --global wix --version 4.0.5
          echo "$env:USERPROFILE\.dotnet\tools" >> $env:GITHUB_PATH
          
          # Install WiX extensions
          wix extension add WixToolset.Util.wixext
          wix extension add WixToolset.Firewall.wixext
        shell: pwsh
        
      - name: Setup MSVC
        uses: ilammy/msvc-dev-cmd@v1
        
      - name: Install vcpkg packages
        run: |
          # Use system vcpkg, not the one from MSVC
          $env:VCPKG_ROOT = "C:\vcpkg"
          vcpkg install openssl:x64-windows gtest:x64-windows --x-manifest-root=.
        shell: pwsh
        
      - name: Configure
        run: |
          cmake -S . -B build `
            -G "Visual Studio 17 2022" `
            -A x64 `
            -DCMAKE_PREFIX_PATH="$env:QT_ROOT_DIR" `
            -DQt6_DIR="$env:Qt6_DIR" `
            -DBUILD_TESTS=OFF `
            -DBUILD_INSTALLER=ON
        shell: pwsh
        
      - name: Build
        run: cmake --build build --config Release -j $env:NUMBER_OF_PROCESSORS
        shell: pwsh
        
      - name: Copy OpenSSL DLLs
        run: |
          $vcpkgBin = "C:\vcpkg\installed\x64-windows\bin"
          $releaseDirs = @(
            "build\bin\Release",
            "build\src\apps\deskflow-core\Release",
            "build\src\apps\deskflow-daemon\Release"
          )
          
          foreach ($dir in $releaseDirs) {
            if (Test-Path $dir) {
              Copy-Item "$vcpkgBin\libcrypto-3-x64.dll" $dir -ErrorAction SilentlyContinue
              Copy-Item "$vcpkgBin\libssl-3-x64.dll" $dir -ErrorAction SilentlyContinue
              Write-Host "Copied DLLs to $dir"
            }
          }
        shell: pwsh
        
      - name: Create packages
        run: cmake --build build --config Release --target package
        shell: pwsh
        
      - name: Check WiX log on failure
        if: failure()
        run: |
          Write-Host "=== WiX Log ==="
          $wixLog = "build\_CPack_Packages\win64\WIX\wix.log"
          if (Test-Path $wixLog) {
            Get-Content $wixLog
          }
        shell: pwsh
        
      - name: Upload 7Z package
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: deskflow-windows-x64-portable
          path: build/*.7z
          
      - name: Upload WiX installer
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: deskflow-windows-x64-installer
          path: build/*.msi
