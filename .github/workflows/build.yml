# Deskflow Multi-Platform Build
# Supports: macOS ARM64, Windows x64

name: Build

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build-macos-arm64:
    name: macOS ARM64
    runs-on: macos-14  # Apple Silicon
    
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        
      - name: Install dependencies
        run: |
          brew install qt openssl
          
      - name: Configure
        run: |
          cmake -S . -B build \
            -DCMAKE_BUILD_TYPE=Release \
            -DCMAKE_OSX_ARCHITECTURES=arm64 \
            -DQt6_DIR=$(brew --prefix qt)/lib/cmake/Qt6
            
      - name: Build
        run: cmake --build build -j$(sysctl -n hw.ncpu)
        
      - name: Create DMG
        run: |
          cmake --build build --target package
          
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: deskflow-macos-arm64
          path: build/*.dmg
          
  build-windows-x64:
    name: Windows x64
    runs-on: windows-latest
    
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        
      - name: Setup vcpkg
        uses: lukka/run-vcpkg@v11
        with:
          vcpkgGitCommitId: d5ec528843d29e3a52d745a64b469f810b2cedbf
          
      - name: Setup MSVC
        uses: ilammy/msvc-dev-cmd@v1
        
      - name: Configure
        run: |
          cmake -S . -B build `
            -G "Visual Studio 17 2022" `
            -A x64 `
            -DCMAKE_TOOLCHAIN_FILE="$env:VCPKG_ROOT/scripts/buildsystems/vcpkg.cmake" `
            -DVCPKG_TARGET_TRIPLET=x64-windows
        shell: pwsh
        
      - name: Build
        run: cmake --build build --config Release -j $env:NUMBER_OF_PROCESSORS
        shell: pwsh
        
      - name: Create installer
        run: cmake --build build --config Release --target package
        shell: pwsh
        
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: deskflow-windows-x64
          path: build/*.exe
          
  create-release:
    name: Create Release
    needs: [build-macos-arm64, build-windows-x64]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    
    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          
      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          files: |
            artifacts/deskflow-macos-arm64/*.dmg
            artifacts/deskflow-windows-x64/*.exe
          draft: true
          prerelease: false
