# Deskflow Multi-Platform Build

name: Build

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build-windows-x64:
    name: Windows x64
    runs-on: windows-latest
    
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        
      - name: Install Qt using aqtinstall
        run: |
          pip install aqtinstall
          aqt install-qt windows desktop 6.7.0 win64_msvc2019_64 --outputdir C:\Qt
          echo "QT_ROOT_DIR=C:\Qt\6.7.0\msvc2019_64" >> $env:GITHUB_ENV
          echo "Qt6_DIR=C:\Qt\6.7.0\msvc2019_64\lib\cmake\Qt6" >> $env:GITHUB_ENV
        shell: pwsh
        
      - name: Install dependencies via Chocolatey
        run: |
          # Install ninja
          choco install ninja -y
          
          # Install OpenSSL
          choco install openssl -y
          
          # Install WiX
          dotnet tool install --global wix --version 4.0.5
          echo "$env:USERPROFILE\.dotnet\tools" >> $env:GITHUB_PATH
          
          # Install WiX extensions
          wix extension add WixToolset.Util.wixext
          wix extension add WixToolset.Firewall.wixext
        shell: pwsh
        
      - name: Setup MSVC
        uses: ilammy/msvc-dev-cmd@v1
        
      - name: Configure
        run: |
          # Find OpenSSL
          $opensslPath = "C:\Program Files\OpenSSL"
          if (Test-Path $opensslPath) {
            Write-Host "Found OpenSSL at: $opensslPath"
            $env:OPENSSL_ROOT_DIR = $opensslPath
          }
          
          cmake -S . -B build `
            -G "Visual Studio 17 2022" `
            -A x64 `
            -DCMAKE_PREFIX_PATH="$env:QT_ROOT_DIR" `
            -DQt6_DIR="$env:Qt6_DIR" `
            -DOPENSSL_ROOT_DIR="$opensslPath" `
            -DBUILD_TESTS=OFF `
            -DBUILD_INSTALLER=ON
        shell: pwsh
        
      - name: Build
        run: cmake --build build --config Release -j $env:NUMBER_OF_PROCESSORS
        shell: pwsh
        
      - name: Find and copy OpenSSL DLLs
        run: |
          # Find OpenSSL DLLs
          $opensslDlls = @(
            "C:\Program Files\OpenSSL\bin\libcrypto-3-x64.dll",
            "C:\Program Files\OpenSSL\bin\libssl-3-x64.dll",
            "C:\Program Files\OpenSSL-Win64\bin\libcrypto-3-x64.dll",
            "C:\Program Files\OpenSSL-Win64\bin\libssl-3-x64.dll"
          )
          
          $releaseDirs = @(
            "build\bin\Release",
            "build\src\apps\deskflow-core\Release",
            "build\src\apps\deskflow-daemon\Release"
          )
          
          foreach ($dll in $opensslDlls) {
            if (Test-Path $dll) {
              Write-Host "Found OpenSSL DLL: $dll"
              foreach ($dir in $releaseDirs) {
                if (Test-Path $dir) {
                  Copy-Item $dll $dir
                  Write-Host "Copied to $dir"
                }
              }
              break
            }
          }
        shell: pwsh
        
      - name: Create 7Z package
        run: cpack -G 7Z -C Release
        shell: pwsh
        working-directory: build
        
      - name: Create WiX installer
        id: wix
        run: |
          Write-Host "=== Creating WiX installer ==="
          cpack -G WIX -C Release
        shell: pwsh
        working-directory: build
        continue-on-error: true
        
      - name: Check WiX log on failure
        if: steps.wix.outcome == 'failure'
        run: |
          Write-Host "=== WiX Failed - Checking logs ==="
          Get-ChildItem -Path build -Recurse -Filter "wix.log" | ForEach-Object {
            Write-Host "Found log: $($_.FullName)"
            Get-Content $_.FullName
          }
          
          # Also check CPack error output
          Get-ChildItem -Path build -Recurse -Filter "*.log" | ForEach-Object {
            Write-Host "Log file: $($_.FullName)"
          }
        shell: pwsh
        
      - name: List artifacts
        run: |
          Write-Host "=== Build artifacts ==="
          Get-ChildItem -Path build -Include "*.7z","*.msi","*.exe" -Recurse | ForEach-Object {
            Write-Host "$($_.FullName) ($([math]::Round($_.Length/1MB, 2)) MB)"
          }
        shell: pwsh
        
      - name: Upload 7Z package
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: deskflow-windows-x64-portable
          path: build/*.7z
          
      - name: Upload WiX installer
        if: steps.wix.outcome == 'success'
        uses: actions/upload-artifact@v4
        with:
          name: deskflow-windows-x64-installer
          path: build/*.msi
