# Deskflow Multi-Platform Build
# Supports: macOS ARM64, Windows x64

name: Build

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build-macos-arm64:
    name: macOS ARM64
    runs-on: macos-14
    if: false  # Skip for now, focus on Windows
    
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        
      - name: Install dependencies
        run: brew install qt openssl
          
      - name: Configure
        run: |
          cmake -S . -B build \
            -DCMAKE_BUILD_TYPE=Release \
            -DQt6_DIR=$(brew --prefix qt)/lib/cmake/Qt6
            
      - name: Build
        run: cmake --build build -j$(sysctl -n hw.ncpu)
        
      - name: Create DMG
        run: cmake --build build --target package
          
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: deskflow-macos-arm64
          path: build/*.dmg
          
  build-windows-x64:
    name: Windows x64
    runs-on: windows-latest
    
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          clean: true
          
      - name: Install Qt using aqtinstall
        run: |
          pip install aqtinstall
          aqt install-qt windows desktop 6.7.0 win64_msvc2019_64 --outputdir C:\Qt
          echo "QT_ROOT_DIR=C:\Qt\6.7.0\msvc2019_64" >> $env:GITHUB_ENV
          echo "Qt6_DIR=C:\Qt\6.7.0\msvc2019_64\lib\cmake\Qt6" >> $env:GITHUB_ENV
          dir C:\Qt\6.7.0\msvc2019_64
          dir C:\Qt\6.7.0\msvc2019_64\lib\cmake\Qt6
        shell: pwsh
        
      - name: Setup MSVC
        uses: ilammy/msvc-dev-cmd@v1
        
      - name: Install vcpkg packages
        run: vcpkg install openssl:x64-windows gtest:x64-windows
        shell: bash
        
      - name: Configure
        run: |
          Write-Host "=== Environment Variables ==="
          Write-Host "QT_ROOT_DIR = $env:QT_ROOT_DIR"
          Write-Host "Qt6_DIR = $env:Qt6_DIR"
          Write-Host "VCPKG_INSTALLATION_ROOT = $env:VCPKG_INSTALLATION_ROOT"
          
          Write-Host "=== Checking Qt6Config.cmake ==="
          $qt6Config = "$env:Qt6_DIR\Qt6Config.cmake"
          if (Test-Path $qt6Config) {
            Write-Host "Found: $qt6Config"
          } else {
            Write-Host "NOT FOUND: $qt6Config"
            Get-ChildItem "$env:QT_ROOT_DIR\lib\cmake" -Recurse -Filter "Qt6Config.cmake" | ForEach-Object { Write-Host $_.FullName }
          }
          
          cmake -S . -B build `
            -G "Visual Studio 17 2022" `
            -A x64 `
            -DCMAKE_TOOLCHAIN_FILE="${{ github.workspace }}/cmake/vcpkg.cmake" `
            -DVCPKG_TARGET_TRIPLET=x64-windows `
            -DQt6_DIR="$env:Qt6_DIR"
        shell: pwsh
        
      - name: Build
        run: cmake --build build --config Release -j $env:NUMBER_OF_PROCESSORS
        shell: pwsh
        
      - name: Create installer
        run: cmake --build build --config Release --target package
        shell: pwsh
        
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: deskflow-windows-x64
          path: build/Release/*.exe
          
  create-release:
    name: Create Release
    needs: [build-windows-x64]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    
    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          
      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          files: artifacts/deskflow-windows-x64/*.exe
          draft: true
