# Deskflow Multi-Platform Build
# Supports: macOS ARM64, Windows x64

name: Build

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build-macos-arm64:
    name: macOS ARM64
    runs-on: macos-14  # Apple Silicon
    
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        
      - name: Install dependencies
        run: |
          brew install qt openssl
          
      - name: Configure
        run: |
          cmake -S . -B build \
            -DCMAKE_BUILD_TYPE=Release \
            -DCMAKE_OSX_ARCHITECTURES=arm64 \
            -DQt6_DIR=$(brew --prefix qt)/lib/cmake/Qt6
            
      - name: Build
        run: cmake --build build -j$(sysctl -n hw.ncpu)
        
      - name: Create DMG
        run: |
          cmake --build build --target package
          
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: deskflow-macos-arm64
          path: build/*.dmg
          
  build-windows-x64:
    name: Windows x64
    runs-on: windows-latest
    
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        
      - name: Install Qt
        uses: jurplel/install-qt-action@v4
        with:
          version: '6.7.0'
          host: 'windows'
          target: 'desktop'
          arch: 'win64_msvc2019_64'
          cache: true
          
      - name: Setup MSVC
        uses: ilammy/msvc-dev-cmd@v1
        
      - name: Install vcpkg packages (OpenSSL, gtest)
        run: |
          vcpkg install openssl:x64-windows gtest:x64-windows
        shell: bash
        
      - name: Configure
        run: |
          $qt6Dir = "$env:QT_ROOT_DIR\lib\cmake\Qt6"
          echo "Qt6_DIR = $qt6Dir"
          echo "VCPKG_ROOT = $env:VCPKG_INSTALLATION_ROOT"
          
          cmake -S . -B build `
            -G "Visual Studio 17 2022" `
            -A x64 `
            -DCMAKE_TOOLCHAIN_FILE="$env:VCPKG_INSTALLATION_ROOT\scripts\buildsystems\vcpkg.cmake" `
            -DVCPKG_TARGET_TRIPLET=x64-windows `
            -DCMAKE_PREFIX_PATH="$env:QT_ROOT_DIR" `
            -DQt6_DIR="$qt6Dir"
        shell: pwsh
        
      - name: Build
        run: cmake --build build --config Release -j $env:NUMBER_OF_PROCESSORS
        shell: pwsh
        
      - name: Create installer
        run: cmake --build build --config Release --target package
        shell: pwsh
        
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: deskflow-windows-x64
          path: build/Release/*.exe
          
  create-release:
    name: Create Release
    needs: [build-macos-arm64, build-windows-x64]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    
    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          
      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          files: |
            artifacts/deskflow-macos-arm64/*.dmg
            artifacts/deskflow-windows-x64/*.exe
          draft: true
          prerelease: false
