# Deskflow Multi-Platform Build

name: Build

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build-windows-x64:
    name: Windows x64
    runs-on: windows-latest
    
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        
      - name: Install Qt using aqtinstall
        run: |
          pip install aqtinstall
          aqt install-qt windows desktop 6.7.0 win64_msvc2019_64 --outputdir C:\Qt
          echo "QT_ROOT_DIR=C:\Qt\6.7.0\msvc2019_64" >> $env:GITHUB_ENV
          echo "Qt6_DIR=C:\Qt\6.7.0\msvc2019_64\lib\cmake\Qt6" >> $env:GITHUB_ENV
        shell: pwsh
        
      - name: Setup MSVC
        uses: ilammy/msvc-dev-cmd@v1
        
      - name: Install vcpkg packages
        run: vcpkg install openssl:x64-windows gtest:x64-windows
        shell: bash
        
      - name: Configure
        run: |
          cmake -S . -B build `
            -G "Visual Studio 17 2022" `
            -A x64 `
            -DCMAKE_PREFIX_PATH="$env:QT_ROOT_DIR" `
            -DQt6_DIR="$env:Qt6_DIR" `
            -DBUILD_TESTS=OFF `
            -DBUILD_INSTALLER=OFF
        shell: pwsh
        
      - name: Build
        run: cmake --build build --config Release -j $env:NUMBER_OF_PROCESSORS
        shell: pwsh
        
      - name: Find and copy OpenSSL DLLs
        run: |
          # Find OpenSSL DLLs in vcpkg
          $vcpkgBin = "$env:VCPKG_INSTALLATION_ROOT\installed\x64-windows\bin"
          Write-Host "Looking for OpenSSL DLLs in: $vcpkgBin"
          
          # Copy DLLs to build output
          $buildBin = "build\bin\Release"
          if (Test-Path $vcpkgBin) {
            Copy-Item "$vcpkgBin\libcrypto-3-x64.dll" $buildBin -ErrorAction SilentlyContinue
            Copy-Item "$vcpkgBin\libssl-3-x64.dll" $buildBin -ErrorAction SilentlyContinue
            Write-Host "Copied OpenSSL DLLs to $buildBin"
          }
          
          # Also copy to deskflow-core location
          $coreDir = "build\src\apps\deskflow-core\Release"
          if (Test-Path $coreDir) {
            Copy-Item "$vcpkgBin\libcrypto-3-x64.dll" $coreDir -ErrorAction SilentlyContinue
            Copy-Item "$vcpkgBin\libssl-3-x64.dll" $coreDir -ErrorAction SilentlyContinue
          }
          
          # List all exe files
          Write-Host "=== Built executables ==="
          Get-ChildItem -Path build -Recurse -Include "*.exe" | ForEach-Object {
            Write-Host $_.FullName
          }
        shell: pwsh
        
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: deskflow-windows-x64
          path: |
            build/bin/Release/*.exe
            build/bin/Release/*.dll
            build/src/apps/deskflow-core/Release/*.exe
            build/src/apps/deskflow-core/Release/*.dll
