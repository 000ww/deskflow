# Deskflow Multi-Platform Build + Release

name: Build

on:
  push:
    branches: [ main, master ]
    tags: [ "v*" ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

env:
  QT_VERSION: "6.7.0"

jobs:
  # ============================================================
  # Windows x64
  # ============================================================
  build-windows-x64:
    name: Windows x64
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Qt using aqtinstall
        run: |
          pip install aqtinstall
          aqt install-qt windows desktop ${{ env.QT_VERSION }} win64_msvc2019_64 --outputdir C:\Qt
          echo "QT_ROOT_DIR=C:\Qt\${{ env.QT_VERSION }}\msvc2019_64" >> $env:GITHUB_ENV
          echo "Qt6_DIR=C:\Qt\${{ env.QT_VERSION }}\msvc2019_64\lib\cmake\Qt6" >> $env:GITHUB_ENV
        shell: pwsh

      - name: Install dependencies via Chocolatey
        run: |
          choco install ninja -y
          choco install openssl -y
          dotnet tool install --global wix --version 4.0.5
          echo "$env:USERPROFILE\.dotnet\tools" >> $env:GITHUB_PATH
          wix extension add WixToolset.Util.wixext
          wix extension add WixToolset.Firewall.wixext
        shell: pwsh

      - name: Setup MSVC
        uses: ilammy/msvc-dev-cmd@v1

      - name: Configure
        run: |
          $opensslPath = "C:\Program Files\OpenSSL"
          if (Test-Path $opensslPath) {
            Write-Host "Found OpenSSL at: $opensslPath"
            $env:OPENSSL_ROOT_DIR = $opensslPath
          }
          cmake -S . -B build `
            -G "Visual Studio 17 2022" `
            -A x64 `
            -DCMAKE_PREFIX_PATH="$env:QT_ROOT_DIR" `
            -DQt6_DIR="$env:Qt6_DIR" `
            -DOPENSSL_ROOT_DIR="$opensslPath" `
            -DBUILD_TESTS=OFF `
            -DBUILD_INSTALLER=ON
        shell: pwsh

      - name: Build
        run: cmake --build build --config Release -j $env:NUMBER_OF_PROCESSORS
        shell: pwsh

      - name: Find and copy OpenSSL DLLs
        run: |
          $opensslDlls = @(
            "C:\Program Files\OpenSSL\bin\libcrypto-3-x64.dll",
            "C:\Program Files\OpenSSL\bin\libssl-3-x64.dll",
            "C:\Program Files\OpenSSL-Win64\bin\libcrypto-3-x64.dll",
            "C:\Program Files\OpenSSL-Win64\bin\libssl-3-x64.dll"
          )
          $releaseDirs = @(
            "build\bin\Release",
            "build\src\apps\deskflow-core\Release",
            "build\src\apps\deskflow-daemon\Release"
          )
          foreach ($dll in $opensslDlls) {
            if (Test-Path $dll) {
              Write-Host "Found OpenSSL DLL: $dll"
              foreach ($dir in $releaseDirs) {
                if (Test-Path $dir) {
                  Copy-Item $dll $dir
                  Write-Host "Copied to $dir"
                }
              }
              break
            }
          }
        shell: pwsh

      - name: Create 7Z package
        run: cpack -G 7Z -C Release
        shell: pwsh
        working-directory: build

      - name: Create WiX installer
        id: wix
        run: cpack -G WIX -C Release
        shell: pwsh
        working-directory: build
        continue-on-error: true

      - name: List artifacts
        if: always()
        run: |
          Get-ChildItem -Path build -Include "*.7z","*.msi" -Recurse | ForEach-Object {
            Write-Host "$($_.FullName) ($([math]::Round($_.Length/1MB, 2)) MB)"
          }
        shell: pwsh

      - name: Upload 7Z package
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: deskflow-windows-x64-portable
          path: build/*.7z

      - name: Upload WiX installer
        if: steps.wix.outcome == 'success'
        uses: actions/upload-artifact@v4
        with:
          name: deskflow-windows-x64-installer
          path: build/*.msi

  # ============================================================
  # macOS (arm64 + x64 universal)
  # ============================================================
  build-macos:
    name: macOS
    runs-on: macos-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install dependencies via Homebrew
        run: |
          brew install qt openssl cmake ninja

      - name: Configure
        run: |
          cmake -S . -B build \
            -G Ninja \
            -DCMAKE_BUILD_TYPE=Release \
            -DCMAKE_PREFIX_PATH="$(brew --prefix qt)" \
            -DQt6_DIR="$(brew --prefix qt)/lib/cmake/Qt6" \
            -DOPENSSL_ROOT_DIR="$(brew --prefix openssl@3)" \
            -DBUILD_TESTS=OFF \
            -DBUILD_INSTALLER=ON

      - name: Build
        run: cmake --build build -j $(sysctl -n hw.ncpu)

      - name: Create DMG
        run: cpack -G DragNDrop -C Release
        working-directory: build

      - name: List artifacts
        if: always()
        run: ls -lh build/*.dmg 2>/dev/null || echo "No DMG found"

      - name: Upload DMG
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: deskflow-macos-dmg
          path: build/*.dmg

  # ============================================================
  # Linux x64 (Ubuntu)
  # ============================================================
  build-linux:
    name: Linux x64
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            cmake ninja-build g++ \
            qt6-base-dev qt6-tools-dev qt6-tools-dev-tools \
            qt6-l10n-tools linguist-tools \
            libssl-dev \
            libgl1-mesa-dev \
            libx11-dev libxtst-dev libxkbfile-dev \
            libxrandr-dev libxinerama-dev libxi-dev \
            libxext-dev libice-dev libsm-dev \
            libglib2.0-dev libxkbcommon-dev \
            pkg-config

      - name: Configure
        run: |
          cmake -S . -B build \
            -G Ninja \
            -DCMAKE_BUILD_TYPE=Release \
            -DBUILD_TESTS=OFF \
            -DBUILD_INSTALLER=ON

      - name: Build
        run: cmake --build build -j $(nproc)

      - name: Create DEB package
        run: cpack -G DEB -C Release
        working-directory: build

      - name: List artifacts
        if: always()
        run: ls -lh build/*.deb 2>/dev/null || echo "No DEB found"

      - name: Upload DEB
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: deskflow-linux-deb
          path: build/*.deb

  # ============================================================
  # Create GitHub Release (only on version tag push)
  # ============================================================
  release:
    name: Create Release
    needs: [ build-windows-x64, build-macos, build-linux ]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')

    permissions:
      contents: write

    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: List downloaded artifacts
        run: find artifacts -type f | head -50

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: Deskflow ${{ github.ref_name }}
          draft: false
          prerelease: ${{ contains(github.ref_name, 'beta') || contains(github.ref_name, 'alpha') || contains(github.ref_name, 'rc') }}
          generate_release_notes: true
          files: |
            artifacts/**/*.7z
            artifacts/**/*.msi
            artifacts/**/*.dmg
            artifacts/**/*.deb
